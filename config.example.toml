# copper-golem configuration
#
# Copy this file to ~/.config/copper-golem/config.toml and edit, or point at it
# with the COPPER_GOLEM_CONFIG environment variable / `--config` flag.

# Folders to watch. Files placed DIRECTLY in a root are sorted into that root's
# sibling category subfolders. Multiple roots allowed. "~" is expanded.
watch_roots = ["~/Downloads"]

# Model used by `claude -p`. Classification is cheap & fast — Haiku is plenty.
model = "claude-haiku-4-5"

# Start in dry-run: nothing is moved, decisions are only printed. Flip to false
# once you trust the results.
dry_run = true

# What to do when no folder matches well enough:
#   "keep"      -> leave the file where it is (Copper-Golem-faithful)
#   "<name>"    -> move it into a folder of that name (e.g. "_unsorted")
on_no_match = "keep"

# Confidence below this is treated as "no match" (curbs misfiling). 0.0–1.0.
confidence_threshold = 0.6

# Cap on extracted text per file fed to the classifier.
max_chars = 4000

# Skip files modified within the last N seconds (avoids grabbing in-flight
# downloads / files still being written).
stability_seconds = 20

# Filename patterns to ignore entirely.
exclude_globs = ["*.crdownload", "*.part", "*.download", "*.tmp", ".*"]

# OCR images with tesseract (slow, requires tesseract). Off by default; when
# off, images are classified by filename (+ pixel dimensions via sips).
enable_ocr = false

# Hard timeout (seconds) for each `claude -p` invocation.
claude_timeout = 120

# Path to the `claude` CLI. Empty = auto-detect (PATH, then mise/npm, homebrew,
# ~/.local, cmux). Set this explicitly if auto-detect fails — important because
# launchd/cron don't inherit your shell PATH and `claude` is often a shell
# function. Example:
#   claude_bin = "~/.local/share/mise/installs/node/24.4.0/bin/claude"
claude_bin = ""

# Show a desktop notification after each live run (moved / kept / errors), so you
# don't have to watch the log file. Set false to disable.
# NOTE: from launchd, osascript notifications are blocked on recent macOS — install
# terminal-notifier (`brew install terminal-notifier`) for reliable delivery.
notify = true

# Play a sound and ignore Do-Not-Disturb so the notification is hard to miss.
# (To make it STAY on screen, set the notifier's style to "Alerts" in
#  System Settings > Notifications > terminal-notifier.)
notify_sound = true

# Also sweep every N seconds, not just when files change (0 = on-change only).
# Catches files skipped during the stability wait, or added before a matching
# category folder existed. 300 = every 5 minutes. Empty sweeps are silent.
interval_seconds = 0

# Remember files that didn't fit any folder, and skip them on later sweeps —
# no repeated Claude calls, no repeated notifications. A cached file is
# re-checked only if its content changes, or when a new category folder appears
# (which might now be its home). Set false to re-check every run.
cache_no_match = true
